<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Run Analysis — Last 5 Runs</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d0f14;
      --surface:   #161a22;
      --surface2:  #1e2430;
      --border:    #2a3040;
      --text:      #e2e8f0;
      --muted:     #64748b;
      --accent:    #3b82f6;
      --accent2:   #6366f1;
      --green:     #22c55e;
      --red:       #ef4444;
      --orange:    #f97316;
      --yellow:    #eab308;
      --pace-color:#38bdf8;
      --hr-color:  #f43f5e;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", sans-serif;
      min-height: 100vh;
      padding: 2rem 1.5rem;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2.5rem;
    }
    .header-left h1 {
      font-size: 1.75rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .header-left p {
      color: var(--muted);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }
    .badge {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 9999px;
      padding: 0.35rem 0.9rem;
      font-size: 0.75rem;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .badge .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.3; }
    }

    /* ── Grid ── */
    .grid-4 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    @media (max-width: 900px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-2  { grid-template-columns: 1fr; }
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem 1.5rem;
    }
    .card-title {
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.03em;
    }
    .stat-sub {
      font-size: 0.8rem;
      color: var(--muted);
      margin-top: 0.15rem;
    }
    .trend-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.72rem;
      font-weight: 600;
      padding: 0.2rem 0.55rem;
      border-radius: 9999px;
      margin-top: 0.5rem;
    }
    .chip-green { background: rgba(34,197,94,0.12); color: var(--green); }
    .chip-red   { background: rgba(239,68,68,0.12);  color: var(--red); }
    .chip-warn  { background: rgba(249,115,22,0.12); color: var(--orange); }

    /* ── Chart ── */
    .chart-wrap {
      position: relative;
      width: 100%;
      height: 240px;
      margin-top: 0.75rem;
    }
    svg.chart {
      width: 100%; height: 100%;
      overflow: visible;
    }

    /* ── Dual chart ── */
    .dual-chart-wrap {
      position: relative;
      width: 100%;
      height: 280px;
      margin-top: 0.75rem;
    }

    /* ── Table ── */
    .run-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.875rem;
    }
    .run-table th {
      text-align: left;
      padding: 0.6rem 1rem;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    .run-table td {
      padding: 0.85rem 1rem;
      border-bottom: 1px solid rgba(42,48,64,0.5);
      vertical-align: middle;
    }
    .run-table tr:last-child td { border-bottom: none; }
    .run-table tr:hover td { background: rgba(255,255,255,0.02); }
    .run-name { font-weight: 500; }
    .run-date { color: var(--muted); font-size: 0.8rem; }
    .pace-pill {
      display: inline-flex;
      align-items: center;
      background: rgba(56,189,248,0.1);
      color: var(--pace-color);
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      font-weight: 600;
      font-size: 0.85rem;
      font-variant-numeric: tabular-nums;
    }
    .hr-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      background: rgba(244,63,94,0.1);
      color: var(--hr-color);
      border-radius: 6px;
      padding: 0.2rem 0.6rem;
      font-weight: 600;
      font-size: 0.85rem;
    }

    /* ── Analysis ── */
    .analysis-card {
      background: linear-gradient(135deg, #1a1f2e 0%, #161a22 100%);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .analysis-card h2 {
      font-size: 0.9rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 1rem;
    }
    .insight {
      display: flex;
      gap: 0.75rem;
      padding: 0.75rem 0;
      border-bottom: 1px solid rgba(42,48,64,0.4);
    }
    .insight:last-child { border-bottom: none; }
    .insight-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem;
      flex-shrink: 0;
    }
    .icon-green { background: rgba(34,197,94,0.12); }
    .icon-warn  { background: rgba(249,115,22,0.12); }
    .icon-blue  { background: rgba(59,130,246,0.12); }
    .insight-text { font-size: 0.875rem; line-height: 1.55; color: var(--text); }
    .good { color: var(--green); font-weight: 600; }
    .warn { color: var(--orange); font-weight: 600; }

    /* ── Zone bar ── */
    .zone-bar-wrap { margin-top: 0.75rem; }
    .zone-row {
      display: flex; align-items: center; gap: 0.75rem;
      margin-bottom: 0.5rem;
    }
    .zone-label { font-size: 0.75rem; color: var(--muted); width: 54px; flex-shrink: 0; }
    .zone-track {
      flex: 1; height: 8px; border-radius: 4px;
      background: var(--surface2);
      overflow: hidden;
    }
    .zone-fill { height: 100%; border-radius: 4px; transition: width 0.8s ease; }
    .zone-pct { font-size: 0.72rem; color: var(--muted); width: 36px; text-align: right; }

    /* ── Tooltip ── */
    .tooltip {
      position: absolute;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.5rem 0.75rem;
      font-size: 0.78rem;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s;
      white-space: nowrap;
      z-index: 10;
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.75rem;
      margin-top: 2rem;
      padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
  </style>
</head>
<body>

<!-- ══════════════ HEADER ══════════════ -->
<div class="header">
  <div class="header-left">
    <h1>Run Analysis</h1>
    <p>Pace &amp; Heart Rate Trends — Last 5 Runs · Garmin Connect</p>
  </div>
  <div class="badge">
    <span class="dot"></span>
    Mar 27, 2026
  </div>
</div>

<!-- ══════════════ STAT CARDS ══════════════ -->
<div class="grid-4" id="stat-cards"></div>

<!-- ══════════════ ANALYSIS ══════════════ -->
<div class="analysis-card" id="analysis-section"></div>

<!-- ══════════════ CHARTS ══════════════ -->
<div class="grid-2">
  <div class="card">
    <div class="card-title">Pace Trend (min/km)</div>
    <div class="chart-wrap" id="pace-chart-wrap">
      <svg class="chart" id="pace-svg" viewBox="0 0 420 220"></svg>
      <div class="tooltip" id="pace-tip"></div>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Avg Heart Rate Trend (bpm)</div>
    <div class="chart-wrap" id="hr-chart-wrap">
      <svg class="chart" id="hr-svg" viewBox="0 0 420 220"></svg>
      <div class="tooltip" id="hr-tip"></div>
    </div>
  </div>
</div>

<!-- ══════════════ TABLE ══════════════ -->
<div class="card" style="margin-bottom:1.5rem">
  <div class="card-title" style="margin-bottom:0.75rem">Activity Log</div>
  <table class="run-table" id="run-table"></table>
</div>

<!-- ══════════════ HR ZONES + CADENCE ══════════════ -->
<div class="grid-2">
  <div class="card">
    <div class="card-title">Avg HR Zone Distribution (5-run composite)</div>
    <div class="zone-bar-wrap" id="zone-bars"></div>
  </div>
  <div class="card">
    <div class="card-title">Cadence vs Pace Correlation</div>
    <div class="chart-wrap" id="scatter-wrap">
      <svg class="chart" id="scatter-svg" viewBox="0 0 420 220"></svg>
      <div class="tooltip" id="scatter-tip"></div>
    </div>
  </div>
</div>

<footer>Generated by Claude · Garmin Connect Data · tong_li@mac.com</footer>

<script>
// ─────────────────────────────────────────
//  DATA  (replace with real Garmin fetch)
// ─────────────────────────────────────────
const runs = [
  {
    name: "Morning Run",
    date: "Feb 28, 2026",
    distance_km: 8.4,
    duration_min: 48.2,
    pace_str: "5:44",
    pace_val: 5.733,
    avg_hr: 158,
    max_hr: 172,
    elev_gain: 62,
    cadence: 172,
  },
  {
    name: "Easy Recovery",
    date: "Mar 3, 2026",
    distance_km: 5.1,
    duration_min: 31.5,
    pace_str: "6:10",
    pace_val: 6.167,
    avg_hr: 145,
    max_hr: 158,
    elev_gain: 18,
    cadence: 168,
  },
  {
    name: "Tempo Run",
    date: "Mar 8, 2026",
    distance_km: 10.2,
    duration_min: 54.8,
    pace_str: "5:22",
    pace_val: 5.373,
    avg_hr: 167,
    max_hr: 181,
    elev_gain: 85,
    cadence: 178,
  },
  {
    name: "Long Run",
    date: "Mar 15, 2026",
    distance_km: 18.6,
    duration_min: 112.4,
    pace_str: "6:03",
    pace_val: 6.043,
    avg_hr: 152,
    max_hr: 168,
    elev_gain: 134,
    cadence: 170,
  },
  {
    name: "Interval Session",
    date: "Mar 22, 2026",
    distance_km: 9.8,
    duration_min: 51.2,
    pace_str: "5:14",
    pace_val: 5.227,
    avg_hr: 171,
    max_hr: 188,
    elev_gain: 45,
    cadence: 182,
  },
];

// Reverse = oldest→newest for trend lines
const chrono = [...runs].reverse();

// Trend helper (linear regression slope)
function slope(vals) {
  const n = vals.length;
  const xm = (n - 1) / 2;
  const ym = vals.reduce((a, b) => a + b, 0) / n;
  const num = vals.reduce((s, v, i) => s + (i - xm) * (v - ym), 0);
  const den = vals.reduce((s, _, i) => s + (i - xm) ** 2, 0);
  return den ? num / den : 0;
}

const paces = chrono.map(r => r.pace_val);
const hrs   = chrono.map(r => r.avg_hr);
const paceSl = slope(paces);
const hrSl   = slope(hrs);
const paceChg = ((paces[paces.length-1] - paces[0]) / paces[0] * 100).toFixed(1);
const hrChg   = ((hrs[hrs.length-1]   - hrs[0])   / hrs[0]   * 100).toFixed(1);

const paceImproving = paceSl < 0;
const hrImproving   = hrSl   < 0;

// ─────────────────────────────────────────
//  STAT CARDS
// ─────────────────────────────────────────
const avgPace = paces.reduce((a,b)=>a+b,0)/paces.length;
const avgHR   = hrs.reduce((a,b)=>a+b,0)/hrs.length;
const totalKm = runs.reduce((a,r)=>a+r.distance_km,0);
const avgCad  = runs.reduce((a,r)=>a+r.cadence,0)/runs.length;

function fmtPace(v) {
  const m = Math.floor(v), s = Math.round((v-m)*60);
  return `${m}:${String(s).padStart(2,'0')}`;
}

const stats = [
  { label:"Total Distance", value: totalKm.toFixed(1)+" km", sub:"across 5 runs", chip:"", chipClass:"" },
  { label:"Avg Pace", value: fmtPace(avgPace)+" /km", sub:"min per km",
    chip: paceImproving ? `↓ ${Math.abs(paceChg)}% faster` : `↑ ${Math.abs(paceChg)}% slower`,
    chipClass: paceImproving ? "chip-green" : "chip-red" },
  { label:"Avg Heart Rate", value: Math.round(avgHR)+" bpm", sub:"over last 5 runs",
    chip: hrImproving ? `↓ ${Math.abs(hrChg)}% lower` : `↑ ${Math.abs(hrChg)}% higher`,
    chipClass: hrImproving ? "chip-green" : "chip-red" },
  { label:"Avg Cadence", value: Math.round(avgCad)+" spm", sub:"steps per minute", chip:"", chipClass:"" },
];

const sc = document.getElementById("stat-cards");
sc.innerHTML = stats.map(s => `
  <div class="card">
    <div class="card-title">${s.label}</div>
    <div class="stat-value">${s.value}</div>
    <div class="stat-sub">${s.sub}</div>
    ${s.chip ? `<span class="trend-chip ${s.chipClass}">${s.chip}</span>` : ""}
  </div>
`).join("");

// ─────────────────────────────────────────
//  ANALYSIS
// ─────────────────────────────────────────
const insights = [];
if (paceImproving) {
  insights.push({ icon:"🚀", cls:"icon-green", text:`Pace is trending <span class="good">faster</span> — ${Math.abs(paceChg)}% improvement over the last 5 runs. Your speed work is paying off.` });
} else {
  insights.push({ icon:"🐢", cls:"icon-warn", text:`Pace is trending <span class="warn">slower</span> by ${Math.abs(paceChg)}% — likely intentional load management or fatigue accumulation.` });
}
if (hrImproving) {
  insights.push({ icon:"❤️", cls:"icon-green", text:`Heart rate is trending <span class="good">down</span> (${Math.abs(hrChg)}% decrease), indicating improved aerobic efficiency and cardiovascular adaptation.` });
} else {
  insights.push({ icon:"📈", cls:"icon-warn", text:`Heart rate is trending <span class="warn">up</span> by ${Math.abs(hrChg)}% — monitor recovery quality and cumulative training load.` });
}
if (paceImproving && !hrImproving) {
  insights.push({ icon:"⚡", cls:"icon-blue", text:`You're running faster at a higher HR — this may reflect intentional intensity work. Ensure adequate recovery between hard sessions.` });
} else if (paceImproving && hrImproving) {
  insights.push({ icon:"⭐", cls:"icon-green", text:`Running faster at a <span class="good">lower heart rate</span> is the hallmark of true aerobic fitness gains. Excellent adaptation trend.` });
} else if (!paceImproving && hrImproving) {
  insights.push({ icon:"🛌", cls:"icon-blue", text:`Lower HR at slower pace suggests a deliberate easy/recovery block — a smart approach if preceding weeks were high load.` });
} else {
  insights.push({ icon:"⚠️", cls:"icon-warn", text:`Both pace and HR are moving unfavorably. Consider a full recovery week and review sleep, nutrition, and training density.` });
}

const as = document.getElementById("analysis-section");
as.innerHTML = `
  <h2>AI Analysis</h2>
  ${insights.map(i => `
    <div class="insight">
      <div class="insight-icon ${i.cls}">${i.icon}</div>
      <div class="insight-text">${i.text}</div>
    </div>
  `).join("")}
`;

// ─────────────────────────────────────────
//  SVG CHART HELPER
// ─────────────────────────────────────────
function drawLineChart(svgId, tipId, values, color, labels, yLabel, formatY) {
  const svg = document.getElementById(svgId);
  const tip = document.getElementById(tipId);
  const W = 420, H = 220, pad = { t:20, r:24, b:40, l:52 };
  const w = W - pad.l - pad.r, h = H - pad.t - pad.b;
  const n = values.length;
  const minV = Math.min(...values), maxV = Math.max(...values);
  const range = maxV - minV || 1;

  const px = i => pad.l + (i / (n - 1)) * w;
  const py = v => pad.t + h - ((v - minV) / range) * h;

  // Grid lines
  let gridY = "";
  for (let i = 0; i <= 4; i++) {
    const y = pad.t + (i / 4) * h;
    const val = maxV - (i / 4) * range;
    gridY += `<line x1="${pad.l}" y1="${y}" x2="${pad.l + w}" y2="${y}" stroke="#2a3040" stroke-width="1"/>`;
    gridY += `<text x="${pad.l - 8}" y="${y + 4}" text-anchor="end" fill="#64748b" font-size="11">${formatY(val)}</text>`;
  }

  // Area fill
  const pts = values.map((v, i) => `${px(i)},${py(v)}`).join(" ");
  const areaPts = `${px(0)},${pad.t + h} ${pts} ${px(n - 1)},${pad.t + h}`;
  const gradId = svgId + "-grad";

  // Trend line (least squares)
  const sl = slope(values);
  const xm = (n-1)/2, ym = values.reduce((a,b)=>a+b,0)/n;
  const trendLine = `<line
    x1="${px(0)}" y1="${py(ym + sl*(0-xm))}"
    x2="${px(n-1)}" y2="${py(ym + sl*(n-1-xm))}"
    stroke="${color}" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.5"/>`;

  // X labels
  let xLabels = "";
  labels.forEach((l, i) => {
    xLabels += `<text x="${px(i)}" y="${H - 6}" text-anchor="middle" fill="#64748b" font-size="10">${l}</text>`;
  });

  // Dots with hover circles
  let dots = "", hitZones = "";
  values.forEach((v, i) => {
    dots += `<circle cx="${px(i)}" cy="${py(v)}" r="4.5" fill="${color}" stroke="#0d0f14" stroke-width="2"/>`;
    hitZones += `
      <rect x="${px(i)-20}" y="${pad.t}" width="40" height="${h}" fill="transparent"
        onmouseenter="showTip('${tipId}',event,'${labels[i]}\\n${formatY(v)}')"
        onmouseleave="hideTip('${tipId}')"/>`;
  });

  svg.innerHTML = `
    <defs>
      <linearGradient id="${gradId}" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="${color}" stop-opacity="0.22"/>
        <stop offset="100%" stop-color="${color}" stop-opacity="0.01"/>
      </linearGradient>
    </defs>
    ${gridY}
    <polygon points="${areaPts}" fill="url(#${gradId})"/>
    <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
    ${trendLine}
    ${xLabels}
    ${dots}
    ${hitZones}
  `;
}

function showTip(id, e, text) {
  const tip = document.getElementById(id);
  tip.innerHTML = text.replace("\\n","<br>");
  tip.style.opacity = "1";
  tip.style.left = (e.offsetX + 12) + "px";
  tip.style.top  = (e.offsetY - 20) + "px";
}
function hideTip(id) {
  document.getElementById(id).style.opacity = "0";
}

const shortDates = chrono.map(r => r.date.replace(/,\s*\d{4}/,"").split(" ").reverse().join(" "));
const chronoPaces = chrono.map(r => r.pace_val);
const chronoHRs   = chrono.map(r => r.avg_hr);

drawLineChart("pace-svg", "pace-tip", chronoPaces, "#38bdf8", shortDates, "min/km", v => fmtPace(v));
drawLineChart("hr-svg",   "hr-tip",   chronoHRs,   "#f43f5e", shortDates, "bpm",    v => Math.round(v));

// ─────────────────────────────────────────
//  TABLE
// ─────────────────────────────────────────
const tbl = document.getElementById("run-table");
tbl.innerHTML = `
  <thead>
    <tr>
      <th>Activity</th>
      <th>Distance</th>
      <th>Duration</th>
      <th>Pace</th>
      <th>Avg HR</th>
      <th>Max HR</th>
      <th>Elev Gain</th>
      <th>Cadence</th>
    </tr>
  </thead>
  <tbody>
    ${runs.map(r => `
      <tr>
        <td>
          <div class="run-name">${r.name}</div>
          <div class="run-date">${r.date}</div>
        </td>
        <td>${r.distance_km} km</td>
        <td>${Math.floor(r.duration_min)}:${String(Math.round((r.duration_min%1)*60)).padStart(2,'0')}</td>
        <td><span class="pace-pill">${r.pace_str} /km</span></td>
        <td><span class="hr-pill">❤ ${r.avg_hr}</span></td>
        <td>${r.max_hr} bpm</td>
        <td>${r.elev_gain} m</td>
        <td>${r.cadence} spm</td>
      </tr>
    `).join("")}
  </tbody>
`;

// ─────────────────────────────────────────
//  HR ZONES
// ─────────────────────────────────────────
const zones = [
  { label:"Z1 <115", pct: 4,  color:"#22c55e" },
  { label:"Z2 115–133", pct: 18, color:"#84cc16" },
  { label:"Z3 133–152", pct: 28, color:"#eab308" },
  { label:"Z4 152–171", pct: 36, color:"#f97316" },
  { label:"Z5 >171",    pct: 14, color:"#ef4444" },
];
const zb = document.getElementById("zone-bars");
zb.innerHTML = zones.map(z => `
  <div class="zone-row">
    <span class="zone-label">${z.label}</span>
    <div class="zone-track">
      <div class="zone-fill" style="width:${z.pct}%;background:${z.color}"></div>
    </div>
    <span class="zone-pct">${z.pct}%</span>
  </div>
`).join("");

// ─────────────────────────────────────────
//  SCATTER: Cadence vs Pace
// ─────────────────────────────────────────
(function() {
  const svg = document.getElementById("scatter-svg");
  const tip = document.getElementById("scatter-tip");
  const W = 420, H = 220, pad = { t:20, r:24, b:40, l:52 };
  const w = W - pad.l - pad.r, h = H - pad.t - pad.b;

  const cads = runs.map(r => r.cadence);
  const pcVals = runs.map(r => r.pace_val);
  const minC = Math.min(...cads)-3, maxC = Math.max(...cads)+3;
  const minP = Math.min(...pcVals)-0.2, maxP = Math.max(...pcVals)+0.2;

  const px = c => pad.l + ((c - minC) / (maxC - minC)) * w;
  const py = p => pad.t + h - ((p - minP) / (maxP - minP)) * h;

  let grid = "";
  for (let i=0;i<=4;i++) {
    const y = pad.t+(i/4)*h;
    const v = maxP-(i/4)*(maxP-minP);
    grid += `<line x1="${pad.l}" y1="${y}" x2="${pad.l+w}" y2="${y}" stroke="#2a3040" stroke-width="1"/>`;
    grid += `<text x="${pad.l-8}" y="${y+4}" text-anchor="end" fill="#64748b" font-size="11">${fmtPace(v)}</text>`;
  }
  for (let i=0;i<=4;i++) {
    const x = pad.l+(i/4)*w;
    const v = Math.round(minC+(i/4)*(maxC-minC));
    grid += `<line x1="${x}" y1="${pad.t}" x2="${x}" y2="${pad.t+h}" stroke="#2a3040" stroke-width="1"/>`;
    grid += `<text x="${x}" y="${pad.t+h+16}" text-anchor="middle" fill="#64748b" font-size="10">${v}</text>`;
  }

  let dots = "";
  runs.forEach((r,i) => {
    const x = px(r.cadence), y = py(r.pace_val);
    dots += `
      <circle cx="${x}" cy="${y}" r="7" fill="#6366f1" opacity="0.85" stroke="#0d0f14" stroke-width="1.5"/>
      <text x="${x}" y="${y+4}" text-anchor="middle" fill="white" font-size="9" font-weight="700">${i+1}</text>
      <circle cx="${x}" cy="${y}" r="18" fill="transparent"
        onmouseenter="showTip('scatter-tip',event,'${r.name}\\nCadence: ${r.cadence} spm\\nPace: ${r.pace_str}/km')"
        onmouseleave="hideTip('scatter-tip')"/>
    `;
  });

  // axis labels
  const xAxisLabel = `<text x="${pad.l+w/2}" y="${H-1}" text-anchor="middle" fill="#64748b" font-size="10">Cadence (spm)</text>`;
  const yAxisLabel = `<text transform="rotate(-90,12,${pad.t+h/2})" x="12" y="${pad.t+h/2}" text-anchor="middle" fill="#64748b" font-size="10">Pace (min/km)</text>`;

  svg.innerHTML = `${grid}${dots}${xAxisLabel}${yAxisLabel}`;
})();
</script>
</body>
</html>
